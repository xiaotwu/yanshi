  <path d="M25.1 25 q2.2 2 4.4 0" fill="none" stroke="#1b1f22" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Mint mechanism seal -->
  <circle cx="33" cy="17" r="3.2" fill="url(#ym-accent)"/>
  <circle cx="33" cy="17" r="1.1" fill="#0c0e10"/>
