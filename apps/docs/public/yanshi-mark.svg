<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Yanshi">
  <defs>
    <linearGradient id="ym-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b1f22"/>
      <stop offset="1" stop-color="#0c0e10"/>
    </linearGradient>
    <linearGradient id="ym-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#39d488"/>
      <stop offset="1" stop-color="#1faa6a"/>
    </linearGradient>
  </defs>
  <!-- Workshop tile -->
  <rect x="2" y="2" width="44" height="44" rx="12" fill="url(#ym-bg)" stroke="#2b3033" stroke-width="1.5"/>
  <!-- Puppet-ear fins (the Yanshi silhouette cue) -->
  <path d="M16 16 L12 8 L19 12 Z" fill="url(#ym-accent)" opacity="0.9"/>
  <path d="M32 16 L36 8 L29 12 Z" fill="url(#ym-accent)" opacity="0.9"/>
  <!-- Head -->
