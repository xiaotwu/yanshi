  <head>

    <title>Concept A selected rig seven-expression preview</title>
    <style>
      :root {
        --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
        --background: oklch(0.97 0.02 83);
        --surface: oklch(0.94 0.015 83);
        --surface-elevated: oklch(0.995 0.008 90);
        --border: oklch(0.84 0.03 86);
        --text-primary: oklch(0.18 0.03 305);
        --text-secondary: oklch(0.35 0.04 305);
        --text-muted: oklch(0.55 0.04 305);
        --accent: oklch(0.67 0.10 167);
        --warning: oklch(0.58 0.16 35);
        --danger: oklch(0.56 0.17 28);
        --success: oklch(0.62 0.14 147);
        --ws-edge: oklch(0.35 0.04 305);
        --ws-panel: oklch(0.94 0.035 88);
        --ws-brass: oklch(0.72 0.11 79);
        --ws-parchment: oklch(0.94 0.035 88);
        --ym-outline: color-mix(in srgb, var(--text-primary) 86%, var(--ws-edge));
        --ym-face: oklch(0.91 0.045 49);
        --ym-face-shadow: color-mix(in srgb, var(--ym-face) 74%, var(--ws-edge));
        --ym-hair: oklch(0.34 0.075 334);
        --ym-hair-shine: oklch(0.50 0.08 336);
        --ym-body: color-mix(in srgb, var(--text-primary) 72%, var(--surface));
        --ym-body-light: color-mix(in srgb, var(--ym-body) 82%, var(--text-primary));
        --ym-trim: var(--ws-brass);
        --ym-accent: var(--accent);
        --ym-state: var(--accent);
        --ym-horn: color-mix(in srgb, var(--ws-parchment) 72%, var(--ym-trim));
        --ym-horn-shadow: color-mix(in srgb, var(--ym-horn) 62%, var(--ym-outline));
        --ym-apron: color-mix(in srgb, var(--ym-accent) 74%, var(--surface-elevated));
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--background);
        color: var(--text-primary);
        font-family: var(--font-sans);
      }
      .preview {
        width: 1440px;
        min-height: 920px;
        padding: 44px 52px;
      }
      h1 {
        margin: 0;
        font-size: 38px;
        line-height: 1.08;
        letter-spacing: 0;
      }
      p {
        margin: 10px 0 28px;
        color: var(--text-secondary);
        font-size: 19px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 24px;
      }
      .preview-card {
        display: grid;
        justify-items: center;
        gap: 16px;
        margin: 0;
        padding: 24px 18px 18px;
        min-height: 312px;
        background: color-mix(in srgb, var(--surface-elevated) 94%, var(--ws-parchment));
        border: 2px solid var(--border);
        border-radius: 18px;
      }
      .preview-card:first-child {
        grid-column: span 2;
      }
      figcaption {
        color: var(--text-secondary);
        font-size: 18px;
        font-weight: 750;
      }
      /* ── Yanshi mascot base rig (tokenized inline SVG) ───────────────────────────── */
.yanshi-mascot {
  --ym-local-accent: var(--ym-accent);
  --ym-local-state: var(--ym-state);
  display: block;
  width: 72px;
  height: auto;
  overflow: visible;
  color: var(--ym-outline);
}
.yanshi-mascot--rail { width: 40px; }
.yanshi-mascot--stage { width: 84px; }
.yanshi-mascot--hero { width: 156px; }

.yanshi-mascot__layer,
.yanshi-mascot__expression,
.yanshi-mascot__shadow-ring {
  transform-box: fill-box;
  transform-origin: center;
}

.yanshi-mascot__shadow-ring ellipse:first-child {
  fill: color-mix(in srgb, var(--ym-outline) 22%, transparent);
}
.yanshi-mascot__status-ring {
  fill: none;
  stroke: var(--ym-local-state);
  stroke-width: 3;
  opacity: 0.4;
}

.yanshi-mascot__back-hair path,
.yanshi-mascot__front-hair > path:first-child,
.yanshi-mascot__front-hair .yanshi-mascot__hair-lock {
  fill: var(--ym-hair);
  stroke: var(--ym-outline);
  stroke-width: 6;
  stroke-linejoin: round;
  stroke-linecap: round;
}
.yanshi-mascot__dragon-horns > path:not(.yanshi-mascot__horn-panel) {
  fill: var(--ym-horn);
  stroke: var(--ym-outline);
  stroke-width: 6;
  stroke-linejoin: round;
  stroke-linecap: round;
}
.yanshi-mascot__hair-shine {
  fill: var(--ym-hair-shine);
  opacity: 0.7;
}
.yanshi-mascot__hair-glint {
  fill: color-mix(in srgb, var(--ym-hair-shine) 70%, var(--ym-face));
  opacity: 0.8;
}
.yanshi-mascot__sash,
.yanshi-mascot__prop-slot rect {
  fill: var(--ym-local-accent);
}
.yanshi-mascot__thought-dot,
.yanshi-mascot__state-accents circle {
  fill: var(--ym-local-state);
}

.yanshi-mascot__body > path:first-child {
  fill: var(--ym-body);
  stroke: var(--ym-outline);
  stroke-width: 6;
  stroke-linejoin: round;
}
.yanshi-mascot__sleeve,
.yanshi-mascot__hand,
.yanshi-mascot__boot {
  stroke: var(--ym-outline);
  stroke-width: 4;
  stroke-linejoin: round;
}
.yanshi-mascot__sleeve {
  fill: none;
  stroke-width: 5;
  stroke-linecap: round;
}
.yanshi-mascot__hand {
  fill: var(--ym-face);
}
.yanshi-mascot__boot {
  fill: var(--ym-body-light);
}
.yanshi-mascot__joint {
  fill: none;
  stroke: color-mix(in srgb, var(--ym-outline) 70%, var(--ym-local-accent));
  stroke-width: 3;
  stroke-linecap: round;
}

.yanshi-mascot__head > path {
  fill: var(--ym-face);
  stroke: var(--ym-outline);
  stroke-width: 6;
  stroke-linejoin: round;
}

.yanshi-mascot__apron-tab > path:first-child {
  fill: var(--ym-apron);
  stroke: var(--ym-outline);
  stroke-width: 5;
  stroke-linejoin: round;
}
.yanshi-mascot__apron-stroke {
  fill: none;
  stroke: color-mix(in srgb, var(--ym-outline) 72%, var(--ym-apron));
  stroke-width: 4;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.yanshi-mascot__collar {
  fill: var(--ym-trim);
  stroke: var(--ym-outline);
  stroke-width: 4;
  stroke-linejoin: round;
}
.yanshi-mascot__blush {
  fill: color-mix(in srgb, var(--ym-warning) 40%, var(--ym-face));
  opacity: 0.58;
}

.yanshi-mascot__expression path {
  fill: none;
  stroke: var(--ym-outline);
  stroke-width: 4.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.yanshi-mascot__blank-eye {
  fill: var(--ym-face-shadow);
  stroke: var(--ym-outline);
  stroke-width: 3.5;
}
.yanshi-mascot__expression ellipse,
.yanshi-mascot__expression circle {
  fill: var(--ym-outline);
}
.yanshi-mascot__eye-shine {
  fill: var(--ym-face) !important;
}
.yanshi-mascot__mouth--open {
  fill: var(--ym-outline) !important;
}
.yanshi-mascot__sweat {
  fill: color-mix(in srgb, var(--ym-danger) 45%, var(--ym-face)) !important;
  stroke: var(--ym-outline);
  stroke-width: 3;
}
.yanshi-mascot__sleep-text {
  fill: var(--ym-outline);
  font: 700 22px var(--font-sans);
}
.yanshi-mascot__sleep-text--small {
  font-size: 15px;
}

.yanshi-mascot__horn-panel {
  fill: none;
  stroke: var(--ym-horn-shadow);
  stroke-width: 4;
  stroke-linecap: round;
}
.yanshi-mascot__talisman-seal > path:first-child {
  fill: var(--ym-warning);
  stroke: var(--ym-outline);
  stroke-width: 4;
  stroke-linejoin: round;
}
.yanshi-mascot__talisman-seal > path:last-child,
.yanshi-mascot__prop-slot path,
.yanshi-mascot__state-accents path {
  fill: none;
  stroke: var(--ym-outline);
  stroke-width: 3;
  stroke-linecap: round;
}
.yanshi-mascot__prop-slot rect {
  stroke: var(--ym-outline);
  stroke-width: 4;
}
.yanshi-mascot__state-accents path {
  stroke: var(--ym-local-state);
}

.yanshi-mascot--expr-thinking {
  --ym-local-state: var(--ym-warning);
}
.yanshi-mascot--expr-focused {
  --ym-local-state: var(--ym-accent);
}
.yanshi-mascot--expr-happy {
  --ym-local-state: var(--ym-success);
}
.yanshi-mascot--expr-error {
  --ym-local-state: var(--ym-danger);
}
.yanshi-mascot--expr-sleeping {
  --ym-local-state: var(--ym-muted);
}

.yanshi-mascot--animated .yanshi-mascot__body {
  animation: yanshi-mascot-breathe 2.8s ease-in-out infinite;
}
.yanshi-mascot--animated .yanshi-mascot__state-accents {
  animation: yanshi-mascot-accent-drift 3.2s ease-in-out infinite;
}
.yanshi-mascot--expr-focused.yanshi-mascot--animated .yanshi-mascot__body {
  animation-duration: 1.2s;
}
.yanshi-mascot--expr-error.yanshi-mascot--animated .yanshi-mascot__body,
.yanshi-mascot--expr-sleeping.yanshi-mascot--animated .yanshi-mascot__body {
  animation-duration: 4.8s;
}
.yanshi-mascot--reduced-motion .yanshi-mascot__layer,
.yanshi-mascot--reduced-motion .yanshi-mascot__expression,
.yanshi-mascot--reduced-motion .yanshi-mascot__shadow-ring,
.yanshi-mascot--reduced-motion .yanshi-mascot__state-accents {
  animation: none !important;
}

@keyframes yanshi-mascot-breathe {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-2px); }
}

@keyframes yanshi-mascot-accent-drift {
  0%, 100% { opacity: 0.64; transform: translateY(0); }
  50% { opacity: 1; transform: translateY(-4px); }
}

@media (prefers-reduced-motion: reduce) {
  .yanshi-mascot--animated .yanshi-mascot__layer,
  .yanshi-mascot--animated .yanshi-mascot__expression,
  .yanshi-mascot--animated .yanshi-mascot__shadow-ring,
  .yanshi-mascot--animated .yanshi-mascot__state-accents {
    animation: none !important;
  }
}

    </style>
  </head>
