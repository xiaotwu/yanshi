<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560" role="img" aria-labelledby="title desc">
  <title id="title">Concept A Paper-Lantern Dragon Apprentice</title>
  <desc id="desc">Original chibi dragon-horn girl mascot concept with neutral and happy expressions.</desc>
  <style>
    :root {
      --bg: oklch(0.97 0.02 83);
      --panel: oklch(0.995 0.01 90);
      --grid: oklch(0.84 0.03 86);
      --ink: oklch(0.18 0.03 305);
      --line-soft: oklch(0.35 0.04 305);
      --face: oklch(0.91 0.045 49);
      --cheek: oklch(0.78 0.12 24);
      --hair: oklch(0.34 0.075 334);
      --hair-light: oklch(0.50 0.08 336);
      --horn: oklch(0.82 0.075 83);
      --horn-shadow: oklch(0.67 0.08 73);
      --paper: oklch(0.94 0.035 88);
      --jade: oklch(0.67 0.10 167);
      --jade-light: oklch(0.78 0.08 168);
      --brass: oklch(0.72 0.11 79);
      --seal: oklch(0.58 0.16 35);
      --shadow: oklch(0.58 0.04 290 / 0.24);
    }
    .sheet { fill: var(--bg); }
    .card { fill: var(--panel); stroke: var(--grid); stroke-width: 2; }
    .guide { stroke: var(--grid); stroke-width: 1.5; opacity: 0.42; }
    .title { font: 700 27px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: var(--ink); letter-spacing: 0; }
    .subtitle, .label { font: 650 18px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: var(--line-soft); letter-spacing: 0; }
    .note { font: 500 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: var(--line-soft); letter-spacing: 0; }
    .part { stroke: var(--ink); stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; vector-effect: non-scaling-stroke; }
    .line { fill: none; stroke: var(--ink); stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; vector-effect: non-scaling-stroke; }
    .thin { fill: none; stroke: var(--ink); stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; vector-effect: non-scaling-stroke; }
  </style>

